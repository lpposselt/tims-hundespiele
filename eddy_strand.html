<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🏖️ Eddy am Strand! 🐕</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;touch-action:none;}
body{
  background:#1a1a2e;overflow:hidden;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;font-family:'Segoe UI',sans-serif;user-select:none;
}
canvas{display:block;border-radius:10px;box-shadow:0 8px 40px rgba(0,0,0,0.5);}
#ui{
  position:fixed;top:10px;left:50%;transform:translateX(-50%);
  display:flex;gap:16px;z-index:10;
}
.stat{
  background:rgba(0,0,0,0.5);color:#fff;padding:6px 16px;border-radius:20px;
  font-size:0.9rem;font-weight:700;backdrop-filter:blur(6px);
}
#shout{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:3rem;font-weight:900;color:#fff;text-shadow:3px 3px 12px rgba(0,0,0,0.6);
  pointer-events:none;opacity:0;transition:opacity 0.15s;z-index:20;
  white-space:nowrap;
}
#shout.show{opacity:1;animation:shoutPulse 0.5s ease-in-out;}
@keyframes shoutPulse{
  0%{transform:translate(-50%,-50%) scale(0.5);}
  50%{transform:translate(-50%,-50%) scale(1.15);}
  100%{transform:translate(-50%,-50%) scale(1);}
}
#mobileControls{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  display:none;gap:8px;z-index:10;
}
.dpad{display:grid;grid-template-columns:60px 60px 60px;grid-template-rows:60px 60px 60px;gap:4px;}
.dpad button{
  width:60px;height:60px;border:none;border-radius:14px;
  background:rgba(255,255,255,0.18);color:#fff;font-size:1.6rem;
  cursor:pointer;backdrop-filter:blur(4px);
}
.dpad button:active{background:rgba(255,255,255,0.35);}
.dpad .empty{background:transparent;pointer-events:none;}
#startOverlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.6);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:999;backdrop-filter:blur(8px);
}
#startOverlay h1{color:#fff;font-size:2.4rem;margin-bottom:6px;text-shadow:2px 2px 8px rgba(0,0,0,0.4);}
#startOverlay p{color:#ddd;font-size:1.1rem;margin-bottom:16px;text-align:center;max-width:340px;line-height:1.5;}
.btn{
  padding:12px 36px;font-size:1.1rem;font-weight:700;color:#1a1a2e;
  background:#fff;border:none;border-radius:30px;cursor:pointer;
  box-shadow:0 4px 14px rgba(0,0,0,0.2);transition:transform 0.15s;
}
.btn:hover{transform:scale(1.06);}
#soundBtn{
  position:fixed;top:10px;right:14px;z-index:10;
  background:rgba(0,0,0,0.5);color:#fff;border:none;padding:6px 14px;
  border-radius:20px;font-size:0.85rem;cursor:pointer;backdrop-filter:blur(6px);
}
@media(pointer:coarse){#mobileControls{display:grid;}}
@media(max-width:500px){
  #shout{font-size:2rem;}
  .stat{font-size:0.75rem;padding:4px 10px;}
}
</style>
</head>
<body>

<div id="ui">
  <div class="stat">❤️ <span id="lives">3</span></div>
  <div class="stat">⭐ <span id="score">0</span></div>
  <div class="stat">⏱️ <span id="timer">0</span>s</div>
  <div class="stat">🐕 <span id="dogcount">1</span></div>
</div>
<div id="shout"></div>
<button id="soundBtn" onclick="toggleSound()">🔊 Ton</button>

<canvas id="game"></canvas>

<div id="mobileControls">
  <div class="dpad">
    <div class="empty"></div>
    <button id="btnUp">⬆️</button>
    <div class="empty"></div>
    <button id="btnLeft">⬅️</button>
    <div class="empty"></div>
    <button id="btnRight">➡️</button>
    <div class="empty"></div>
    <button id="btnDown">⬇️</button>
    <div class="empty"></div>
  </div>
</div>

<div id="startOverlay">
  <h1>🏖️ Eddy am Strand! 🐕</h1>
  <p>Weiche dem Hund <b>Eddy</b> auf dem Sand aus!<br>
     Im Wasser lauern <b>Quallen</b>!<br>
     Sonnenschirm-Crash = neuer Hund! 🐕<br>
     Stein-Crash im Meer = neue Medusa! 🪼</p>
  <button class="btn" onclick="beginGame()">Spielen! 🎮</button>
</div>

<script>
// ════════════════════════════════════════
//  CANVAS SETUP
// ════════════════════════════════════════
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

function resize() {
  const maxW = Math.min(window.innerWidth - 10, 500);
  const maxH = Math.min(window.innerHeight - 100, 700);
  canvas.width = maxW;
  canvas.height = maxH;
}
resize();
window.addEventListener('resize', resize);

// ════════════════════════════════════════
//  AUDIO ENGINE
// ════════════════════════════════════════
let audioCtx = null, muted = false;
let waveOsc = null, waveGain = null;
let musicTimeouts = [];

function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function toggleSound() {
  ensureAudio();
  muted = !muted;
  document.getElementById('soundBtn').textContent = muted ? '🔇 Aus' : '🔊 Ton';
  if (muted) stopAllAudio();
  else { startWaves(); playFelicita(); }
}

// ── Wave sound ──
function startWaves() {
  if (muted || !audioCtx || waveOsc) return;
  ensureAudio();
  const bufSize = audioCtx.sampleRate * 4;
  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) {
    const t = i / audioCtx.sampleRate;
    const wave = Math.sin(t * 0.3) * 0.5 + Math.sin(t * 0.7) * 0.3 + Math.sin(t * 1.1) * 0.2;
    d[i] = (Math.random() * 2 - 1) * (0.3 + wave * 0.4);
  }
  waveOsc = audioCtx.createBufferSource();
  waveOsc.buffer = buf;
  waveOsc.loop = true;
  const filt = audioCtx.createBiquadFilter();
  filt.type = 'lowpass'; filt.frequency.value = 400; filt.Q.value = 0.5;
  const lfo = audioCtx.createOscillator();
  const lfoGain = audioCtx.createGain();
  lfo.type = 'sine'; lfo.frequency.value = 0.15;
  lfoGain.gain.value = 250;
  lfo.connect(lfoGain);
  lfoGain.connect(filt.frequency);
  lfo.start();
  waveGain = audioCtx.createGain();
  waveGain.gain.value = 0.07;
  waveOsc.connect(filt);
  filt.connect(waveGain);
  waveGain.connect(audioCtx.destination);
  waveOsc.start();
  waveOsc._lfo = lfo;
}

function stopWaves() {
  if (waveOsc) {
    try { waveOsc.stop(); waveOsc._lfo.stop(); } catch(e) {}
    waveOsc = null; waveGain = null;
  }
}

// ── "Felicità" by Al Bano & Romina Power ──
const N = {
  D4:293.66,E4:329.63,Fs4:369.99,G4:392.00,A4:440.00,B4:493.88,
  C5:523.25,D5:587.33,E5:659.25,Fs5:739.99,G5:783.99,A5:880.00,B5:987.77,
  C4:261.63,F4:349.23,
};
const FELICITA = [
  ['B4',2],['A4',2],['G4',2],['E4',2],['G4',6],['G4',2],
  ['A4',2],['B4',2],['A4',2],['G4',2],['Fs4',4],['D4',4],
  ['E4',2],['Fs4',2],['G4',2],['A4',2],['B4',4],['B4',4],
  ['A4',2],['G4',2],['Fs4',2],['E4',2],['D4',4],['D4',4],

  ['B4',2],['A4',2],['G4',2],['E4',2],['G4',6],['A4',2],
  ['B4',2],['D5',2],['B4',2],['A4',2],['G4',4],['Fs4',4],
  ['G4',2],['A4',2],['B4',2],['D5',2],['D5',4],['B4',4],
  ['A4',2],['G4',2],['Fs4',2],['E4',2],['G4',8],

  ['D5',2],['D5',2],['B4',2],['A4',2],['G4',4],['G4',4],
  ['E5',2],['D5',2],['B4',2],['A4',2],['B4',4],['G4',4],
  ['D5',2],['E5',2],['D5',2],['B4',2],['A4',4],['Fs4',4],
  ['G4',2],['A4',2],['B4',2],['A4',2],['G4',8],
];

// ── Cheerful plucked-string sound (no organ!) ──
function playNote(freq, t, dur, vol, bright) {
  if (!audioCtx || muted) return;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = 'sine';
  o.frequency.value = freq;
  // Add 2nd harmonic for brightness
  if (bright) {
    const o2 = audioCtx.createOscillator(), g2 = audioCtx.createGain();
    o2.type = 'sine'; o2.frequency.value = freq * 2;
    g2.gain.setValueAtTime(0, t);
    g2.gain.linearRampToValueAtTime(vol * 0.18, t + 0.005);
    g2.gain.exponentialRampToValueAtTime(0.001, t + dur * 0.35);
    o2.connect(g2); g2.connect(audioCtx.destination);
    o2.start(t); o2.stop(t + dur);
    // 3rd harmonic very soft
    const o3 = audioCtx.createOscillator(), g3 = audioCtx.createGain();
    o3.type = 'sine'; o3.frequency.value = freq * 3;
    g3.gain.setValueAtTime(0, t);
    g3.gain.linearRampToValueAtTime(vol * 0.06, t + 0.004);
    g3.gain.exponentialRampToValueAtTime(0.001, t + dur * 0.2);
    o3.connect(g3); g3.connect(audioCtx.destination);
    o3.start(t); o3.stop(t + dur);
  }
  // Plucky envelope – fast attack, quick decay, gentle sustain
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(vol, t + 0.006);
  g.gain.exponentialRampToValueAtTime(vol * 0.45, t + 0.05);
  g.gain.linearRampToValueAtTime(vol * 0.3, t + dur * 0.6);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur - 0.01);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(t); o.stop(t + dur);
}

// ── Percussion (hi-hat, shaker, kick) ──
function playPerc(t, type) {
  if (!audioCtx || muted) return;
  const dur = type === 'kick' ? 0.08 : 0.035;
  const bufSize = Math.ceil(audioCtx.sampleRate * dur);
  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) d[i] = (Math.random() * 2 - 1);
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  const filt = audioCtx.createBiquadFilter();
  if (type === 'hat') {
    filt.type = 'highpass'; filt.frequency.value = 9000;
  } else if (type === 'shaker') {
    filt.type = 'bandpass'; filt.frequency.value = 7000; filt.Q.value = 1;
  } else {
    filt.type = 'lowpass'; filt.frequency.value = 180;
  }
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(type === 'kick' ? 0.05 : 0.025, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  src.connect(filt); filt.connect(g); g.connect(audioCtx.destination);
  src.start(t); src.stop(t + dur + 0.01);
}

// ── Mandolin tremolo (Italian!) ──
function playMandolin(freq, t, dur, vol) {
  if (!audioCtx || muted) return;
  // Rapid tremolo picking – 3 fast repeats per note
  const picks = Math.max(2, Math.floor(dur / 0.06));
  const pickDur = dur / picks;
  for (let p = 0; p < picks; p++) {
    const pt = t + p * pickDur;
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = 'sine'; o.frequency.value = freq;
    // 2nd harmonic for brightness
    const o2 = audioCtx.createOscillator(), g2 = audioCtx.createGain();
    o2.type = 'sine'; o2.frequency.value = freq * 2;
    g2.gain.setValueAtTime(0, pt);
    g2.gain.linearRampToValueAtTime(vol * 0.22, pt + 0.003);
    g2.gain.exponentialRampToValueAtTime(0.001, pt + pickDur * 0.7);
    o2.connect(g2); g2.connect(audioCtx.destination);
    o2.start(pt); o2.stop(pt + pickDur);
    // 3rd harmonic
    const o3 = audioCtx.createOscillator(), g3 = audioCtx.createGain();
    o3.type = 'sine'; o3.frequency.value = freq * 3;
    g3.gain.setValueAtTime(0, pt);
    g3.gain.linearRampToValueAtTime(vol * 0.08, pt + 0.003);
    g3.gain.exponentialRampToValueAtTime(0.001, pt + pickDur * 0.4);
    o3.connect(g3); g3.connect(audioCtx.destination);
    o3.start(pt); o3.stop(pt + pickDur);
    // Main pluck
    g.gain.setValueAtTime(0, pt);
    g.gain.linearRampToValueAtTime(vol * (1 - p * 0.06), pt + 0.003);
    g.gain.exponentialRampToValueAtTime(0.001, pt + pickDur * 0.85);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(pt); o.stop(pt + pickDur);
  }
}

// ── Tambourine (Italian folk!) ──
function playTamb(t) {
  if (!audioCtx || muted) return;
  const dur = 0.06;
  const bufSize = Math.ceil(audioCtx.sampleRate * dur);
  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) d[i] = (Math.random() * 2 - 1);
  const src = audioCtx.createBufferSource(); src.buffer = buf;
  const filt = audioCtx.createBiquadFilter();
  filt.type = 'highpass'; filt.frequency.value = 6000; filt.Q.value = 0.8;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.04, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  src.connect(filt); filt.connect(g); g.connect(audioCtx.destination);
  src.start(t); src.stop(t + dur + 0.01);
}

function playFelicita() {
  if (!audioCtx || muted || !gameRunning) return;
  const bpm = 138;
  const eighth = 60 / bpm / 2;
  const now = audioCtx.currentTime + 0.05;
  let t = now;
  let beatCount = 0;
  for (const [n, dur] of FELICITA) {
    const d = dur * eighth;
    const freq = N[n];
    // Lead melody – mandolin tremolo on long notes, pluck on short
    if (dur >= 4) {
      playMandolin(freq, t, d * 0.88, 0.055);
    } else {
      playNote(freq, t, d * 0.82, 0.065, true);
    }
    // Harmony – major third above on held notes (Italian harmony)
    if (dur >= 6) {
      playMandolin(freq * 1.26, t + 0.01, d * 0.5, 0.02);
    }
    // Walking bass – Italian style oom-pah
    if (beatCount % 8 === 0) {
      playNote(freq * 0.25, t, eighth * 1.8, 0.04, false);
      playPerc(t, 'kick');
    }
    if (beatCount % 8 === 4) {
      playNote(freq * 0.375, t, eighth * 1.5, 0.025, false);
    }
    // Tambourine on every beat (tarantella feel)
    if (beatCount % 2 === 0) {
      playTamb(t);
    }
    // Extra tambourine ghost note for swing
    if (beatCount % 4 === 3) {
      playTamb(t + eighth * 0.5);
    }
    // Accordion-like chord stab (sine cluster)
    if (beatCount % 4 === 0) {
      playNote(freq * 0.5, t, eighth * 0.5, 0.016, false);
      playNote(freq * 0.63, t, eighth * 0.5, 0.012, false);
      playNote(freq * 0.75, t, eighth * 0.5, 0.010, false);
    }
    if (beatCount % 4 === 2) {
      playNote(freq * 0.5, t, eighth * 0.3, 0.010, false);
      playNote(freq * 0.63, t, eighth * 0.3, 0.008, false);
    }
    beatCount += dur;
    t += d;
  }
  const totalMs = (t - now) * 1000;
  const tid = setTimeout(() => { if (gameRunning && !muted) playFelicita(); }, totalMs - 50);
  musicTimeouts.push(tid);
}

// ── Shout sounds ──
function shoutEddy() {
  if (!audioCtx || muted) return;
  ensureAudio();
  const now = audioCtx.currentTime;
  const vowels = [
    { f: 350, t: 0, dur: 0.35, vol: 0.18 },
    { f: 300, t: 0.1, dur: 0.4, vol: 0.12 },
    { f: 450, t: 0.38, dur: 0.15, vol: 0.15 },
    { f: 380, t: 0.42, dur: 0.12, vol: 0.12 },
    { f: 520, t: 0.55, dur: 0.2, vol: 0.14 },
  ];
  vowels.forEach(v => {
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(v.f, now + v.t);
    o.frequency.linearRampToValueAtTime(v.f * 0.7, now + v.t + v.dur);
    const filt = audioCtx.createBiquadFilter();
    filt.type = 'bandpass'; filt.frequency.value = v.f * 2; filt.Q.value = 2;
    g.gain.setValueAtTime(0, now + v.t);
    g.gain.linearRampToValueAtTime(v.vol, now + v.t + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, now + v.t + v.dur);
    o.connect(filt); filt.connect(g); g.connect(audioCtx.destination);
    o.start(now + v.t); o.stop(now + v.t + v.dur + 0.01);
  });
}

function shoutMedusa() {
  if (!audioCtx || muted) return;
  ensureAudio();
  const now = audioCtx.currentTime;
  const parts = [
    { f: 300, t: 0, dur: 0.15, vol: 0.15 },
    { f: 350, t: 0.15, dur: 0.12, vol: 0.14 },
    { f: 420, t: 0.28, dur: 0.35, vol: 0.18 },
    { f: 380, t: 0.3, dur: 0.3, vol: 0.1 },
    { f: 480, t: 0.65, dur: 0.12, vol: 0.16 },
    { f: 550, t: 0.78, dur: 0.3, vol: 0.17 },
    { f: 500, t: 0.82, dur: 0.25, vol: 0.1 },
  ];
  parts.forEach(v => {
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(v.f * 1.05, now + v.t);
    o.frequency.linearRampToValueAtTime(v.f * 0.65, now + v.t + v.dur);
    const filt = audioCtx.createBiquadFilter();
    filt.type = 'bandpass'; filt.frequency.value = v.f * 2.2; filt.Q.value = 2.5;
    g.gain.setValueAtTime(0, now + v.t);
    g.gain.linearRampToValueAtTime(v.vol, now + v.t + 0.015);
    g.gain.exponentialRampToValueAtTime(0.001, now + v.t + v.dur);
    o.connect(filt); filt.connect(g); g.connect(audioCtx.destination);
    o.start(now + v.t); o.stop(now + v.t + v.dur + 0.01);
  });
}

function shoutBoerner() {
  if (!audioCtx || muted) return;
  ensureAudio();
  const now = audioCtx.currentTime;
  const parts = [
    { f: 280, t: 0, dur: 0.4, vol: 0.16 },
    { f: 310, t: 0.05, dur: 0.35, vol: 0.1 },
    { f: 420, t: 0.42, dur: 0.12, vol: 0.14 },
    { f: 380, t: 0.45, dur: 0.1, vol: 0.1 },
    { f: 350, t: 0.56, dur: 0.18, vol: 0.13 },
    { f: 280, t: 0.58, dur: 0.15, vol: 0.08 },
  ];
  parts.forEach(v => {
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(v.f * 0.95, now + v.t);
    o.frequency.linearRampToValueAtTime(v.f * 0.75, now + v.t + v.dur);
    const filt = audioCtx.createBiquadFilter();
    filt.type = 'bandpass'; filt.frequency.value = v.f * 1.8; filt.Q.value = 3;
    g.gain.setValueAtTime(0, now + v.t);
    g.gain.linearRampToValueAtTime(v.vol, now + v.t + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, now + v.t + v.dur);
    o.connect(filt); filt.connect(g); g.connect(audioCtx.destination);
    o.start(now + v.t); o.stop(now + v.t + v.dur + 0.01);
  });
}

function updateBoernerShout() {
  const now = Date.now();
  if (now - lastBoernerShout > boernerCooldown && luzernerFamilie.length > 0) {
    lastBoernerShout = now;
    boernerCooldown = 5000 + Math.random() * 10000;
    const phrases = ['Däää Börner!', 'DÄÄÄ BÖRNER!!', 'Dääää Böörner...', 'Heeey Börner!', 'Dä Börner scho wieder!'];
    const phrase = phrases[Math.floor(Math.random() * phrases.length)];
    const cx = (luzernerFamilie[0].x + luzernerFamilie[1].x) / 2;
    const cy = luzernerFamilie[0].y;
    boernerBubble = { text: phrase, timer: 120, x: cx, y: cy };
    shoutBoerner();
  }
}

function stopAllAudio() {
  stopWaves();
  musicTimeouts.forEach(t => clearTimeout(t));
  musicTimeouts = [];
}

// ════════════════════════════════════════
//  GAME STATE
// ════════════════════════════════════════
let gameRunning = false;
let player = { x: 0, y: 0, size: 16 };
let dogs = [];
let jellyfishes = [];   // Array of jellyfish objects
let lives = 3, scoreVal = 0, timeVal = 0;
let lastHitTime = 0;
let shoutTimer = 0;
let keys = {};
let touchDir = { x: 0, y: 0 };
let frameCount = 0;
let gameStartTime = 0;
let lastBoernerShout = 0;
let boernerCooldown = 5000 + Math.random() * 8000;
let boernerBubble = { text: '', timer: 0, x: 0, y: 0 };
let lastUmbrellaHitTime = 0;
let lastRockHitTime = 0;

function waterLineY() { return canvas.height * 0.32; }

// ── Beach furniture + obstacles ──
let beachSets = [];
let seaRocks = [];
let breakwaterRocks = [];
let luzernerFamilie = [];

const DOG_NAMES = ['Eddy','Bello','Rex','Fifi','Waldi','Strolch','Hasso','Pluto','Snoopy','Lassie'];
const DOG_COLORS = ['#8D6E3C','#5C3A1E','#B8860B','#A0522D','#D2B48C','#6B4226','#C4A265','#8B4513','#CD853F','#DEB887'];

function makeDog(x, y, name, colorIdx) {
  return {
    x, y,
    size: 18,
    speed: 1.2 + Math.random() * 0.3,
    angle: 0,
    name: name || DOG_NAMES[Math.min(colorIdx, DOG_NAMES.length - 1)],
    bodyColor: DOG_COLORS[colorIdx % DOG_COLORS.length],
    bellyColor: DOG_COLORS[(colorIdx + 4) % DOG_COLORS.length],
  };
}

function makeJellyfish(x, y) {
  return {
    x, y,
    size: 16,
    speed: 0.9,
    angle: 0,
    tentaclePhase: 0,
    wanderAngle: Math.random() * Math.PI * 2,
  };
}

function spawnNewDog() {
  const W = canvas.width, H = canvas.height;
  const wl = waterLineY();
  const idx = dogs.length;
  let dx, dy, tries = 0;
  do {
    dx = 30 + Math.random() * (W - 60);
    dy = wl + 30 + Math.random() * (H - wl - 60);
    tries++;
  } while (Math.hypot(dx - player.x, dy - player.y) < 80 && tries < 20);
  dogs.push(makeDog(dx, dy, DOG_NAMES[idx % DOG_NAMES.length], idx));
  showShout('🐕 Neuer Hund: ' + dogs[dogs.length - 1].name + '!');
  document.getElementById('dogcount').textContent = dogs.length;
}

function spawnJellyfish() {
  const W = canvas.width;
  const wl = waterLineY();
  let jx, jy, tries = 0;
  do {
    jx = 30 + Math.random() * (W - 60);
    jy = 20 + Math.random() * (wl - 40);
    tries++;
  } while (Math.hypot(jx - player.x, jy - player.y) < 50 && tries < 20);
  jellyfishes.push(makeJellyfish(jx, jy));
  showShout('🪼 Neue Medusa!');
}

// ── Generate irregular rock polygon ──
function generateRockPoints(radius) {
  const n = 5 + Math.floor(Math.random() * 4); // 5-8 vertices
  const pts = [];
  for (let i = 0; i < n; i++) {
    const a = (i / n) * Math.PI * 2 + (Math.random() - 0.5) * 0.4;
    const r = radius * (0.6 + Math.random() * 0.5);
    pts.push({ x: Math.cos(a) * r, y: Math.sin(a) * r });
  }
  return pts;
}

function initObstacles() {
  beachSets = [];
  seaRocks = [];
  breakwaterRocks = [];
  luzernerFamilie = [];
  const W = canvas.width, H = canvas.height;
  const wl = waterLineY();

  // ── Neatly arranged beach sets: 3 rows × 4 columns ──
  const rows = 3, cols = 4;
  const spacingX = (W * 0.78) / cols;
  const spacingY = (H * 0.55) / rows;
  const startX = W * 0.12;
  const startY = wl + H * 0.08;

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      beachSets.push({
        x: startX + c * spacingX + spacingX * 0.5,
        y: startY + r * spacingY + spacingY * 0.3,
        radius: 16,
      });
    }
  }

  // ── Luzerner Familie ──
  const famSet = beachSets[1];
  const famNames = ['Muetter', 'Vatter', 'Büebli', 'Meitli'];
  const famColors = ['#D81B60', '#1565C0', '#43A047', '#FF8F00'];
  for (let i = 0; i < 4; i++) {
    luzernerFamilie.push({
      x: famSet.x - 18 + (i % 2) * 36,
      y: famSet.y + 6 + Math.floor(i / 2) * 22,
      name: famNames[i],
      color: famColors[i],
    });
  }

  // ── Sea rocks with irregular shapes ──
  const numSeaRocks = 6 + Math.floor(Math.random() * 4);
  for (let i = 0; i < numSeaRocks; i++) {
    const rad = 6 + Math.random() * 8;
    seaRocks.push({
      x: 30 + Math.random() * (W - 60),
      y: 20 + Math.random() * (wl - 40),
      radius: rad,
      points: generateRockPoints(rad),
      rot: Math.random() * Math.PI * 2,
    });
  }

  // ── Breakwater rocks (right side) ──
  for (let i = 0; i < 8; i++) {
    const rad = 7 + Math.random() * 5;
    breakwaterRocks.push({
      x: W * 0.8 + Math.random() * W * 0.16,
      y: wl - H * 0.06 + i * (H * 0.035) + Math.random() * 8,
      radius: rad,
      points: generateRockPoints(rad),
      rot: Math.random() * Math.PI * 2,
    });
  }
}

function initGame() {
  const W = canvas.width, H = canvas.height;
  player.x = W * 0.5;
  player.y = H * 0.82;
  dogs = [makeDog(W * 0.2, H * 0.6, 'Eddy', 0)];
  jellyfishes = [makeJellyfish(W * 0.4, H * 0.15)];
  lives = 3; scoreVal = 0; timeVal = 0;
  lastHitTime = 0; shoutTimer = 0;
  lastBoernerShout = Date.now();
  lastUmbrellaHitTime = 0;
  lastRockHitTime = 0;
  boernerCooldown = 3000 + Math.random() * 5000;
  boernerBubble = { text: '', timer: 0, x: 0, y: 0 };
  frameCount = 0;
  gameStartTime = Date.now();
  initObstacles();
  document.getElementById('dogcount').textContent = '1';
  updateUI();
}

function updateUI() {
  document.getElementById('lives').textContent = lives;
  document.getElementById('score').textContent = scoreVal;
  document.getElementById('timer').textContent = timeVal;
}

//  COLLISION HELPERS
// ════════════════════════════════════════
function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }
function isInWater(y) { return y < waterLineY(); }

// Bigger chair hitboxes (chairs are now larger)
function beachSetCollision(px, py, pRadius) {
  for (const bs of beachSets) {
    // Umbrella circle
    const umbR = bs.radius + pRadius;
    const d = Math.hypot(px - bs.x, py - bs.y);
    if (d < umbR && d > 0) {
      return { dx: (px - bs.x) / d, dy: (py - bs.y) / d, dist: d, needed: umbR, set: bs, type: 'umbrella' };
    }
    // Left chair (bigger: 18 wide × 28 tall)
    const lx = bs.x - bs.radius - 18, ly = bs.y - 8;
    const lw = 18, lh = 28;
    if (px + pRadius > lx && px - pRadius < lx + lw && py + pRadius > ly && py - pRadius < ly + lh) {
      const cx = lx + lw / 2, cy = ly + lh / 2;
      const dd = Math.max(0.1, Math.hypot(px - cx, py - cy));
      return { dx: (px - cx) / dd, dy: (py - cy) / dd, dist: dd, needed: 16, set: bs, type: 'chair' };
    }
    // Right chair (bigger)
    const rx = bs.x + bs.radius + 1, ry = bs.y - 8;
    if (px + pRadius > rx && px - pRadius < rx + lw && py + pRadius > ry && py - pRadius < ry + lh) {
      const cx = rx + lw / 2, cy = ry + lh / 2;
      const dd = Math.max(0.1, Math.hypot(px - cx, py - cy));
      return { dx: (px - cx) / dd, dy: (py - cy) / dd, dist: dd, needed: 16, set: bs, type: 'chair' };
    }
  }
  return null;
}

function seaRockCollision(px, py, pRadius) {
  for (const r of seaRocks) {
    const d = Math.hypot(px - r.x, py - r.y);
    const minD = r.radius + pRadius;
    if (d < minD && d > 0) {
      return { dx: (px - r.x) / d, dy: (py - r.y) / d, overlap: minD - d };
    }
  }
  for (const r of breakwaterRocks) {
    const d = Math.hypot(px - r.x, py - r.y);
    const minD = r.radius + pRadius;
    if (d < minD && d > 0) {
      return { dx: (px - r.x) / d, dy: (py - r.y) / d, overlap: minD - d };
    }
  }
  return null;
}

// ── Draw irregular rock shape ──
function drawRockPoly(x, y, points, rot, colors) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rot);
  // Shadow / underwater tint
  ctx.fillStyle = colors[0];
  ctx.beginPath();
  ctx.moveTo(points[0].x * 1.15 + 1.5, points[0].y * 1.15 + 1.5);
  for (let i = 1; i < points.length; i++) {
    ctx.lineTo(points[i].x * 1.15 + 1.5, points[i].y * 1.15 + 1.5);
  }
  ctx.closePath(); ctx.fill();
  // Main body
  ctx.fillStyle = colors[1];
  ctx.beginPath();
  ctx.moveTo(points[0].x, points[0].y);
  for (let i = 1; i < points.length; i++) {
    ctx.lineTo(points[i].x, points[i].y);
  }
  ctx.closePath(); ctx.fill();
  // Lighter facet
  ctx.fillStyle = colors[2];
  ctx.beginPath();
  ctx.moveTo(points[0].x * 0.6 - 1, points[0].y * 0.6 - 1);
  for (let i = 1; i < Math.ceil(points.length / 2); i++) {
    ctx.lineTo(points[i].x * 0.6 - 1, points[i].y * 0.6 - 1);
  }
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

function drawMap() {
  const W = canvas.width, H = canvas.height;
  const wl = waterLineY();

  // Sky
  const skyGrad = ctx.createLinearGradient(0, 0, 0, H * 0.05);
  skyGrad.addColorStop(0, '#87CEEB');
  skyGrad.addColorStop(1, '#5BB8E8');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, H * 0.05);

  // Deep water
  const waterGrad = ctx.createLinearGradient(0, H * 0.05, 0, wl);
  waterGrad.addColorStop(0, '#0077B6');
  waterGrad.addColorStop(0.4, '#0096C7');
  waterGrad.addColorStop(0.7, '#00B4D8');
  waterGrad.addColorStop(1, '#48CAE4');
  ctx.fillStyle = waterGrad;
  ctx.fillRect(0, H * 0.05, W, wl - H * 0.05);

  // Animated waves
  const waveTime = frameCount * 0.02;
  ctx.strokeStyle = 'rgba(255,255,255,0.25)';
  ctx.lineWidth = 1.5;
  for (let i = 0; i < 5; i++) {
    ctx.beginPath();
    const wy = H * 0.08 + i * (wl - H * 0.08) / 5;
    for (let x = 0; x < W; x += 3) {
      const y = wy + Math.sin(x * 0.025 + waveTime + i * 1.2) * 3;
      x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();
  }

  // ── Sea rocks (irregular polygons) ──
  seaRocks.forEach(rock => {
    drawRockPoly(rock.x, rock.y, rock.points, rock.rot,
      ['#3A6B5D', '#5D7B6F', '#4A6B5E']);
    // Foam ring
    ctx.strokeStyle = 'rgba(255,255,255,0.25)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(rock.x, rock.y, rock.radius + 3 + Math.sin(waveTime + rock.x) * 1.5, 0, Math.PI * 2);
    ctx.stroke();
  });

  // Foam/surf line
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.beginPath();
  for (let x = 0; x < W; x += 2) {
    const y = wl + Math.sin(x * 0.04 + waveTime) * 4 - 3;
    x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.lineTo(W, wl + 5); ctx.lineTo(0, wl + 5); ctx.closePath(); ctx.fill();

  // Wet sand
  const wetGrad = ctx.createLinearGradient(0, wl, 0, wl + H * 0.05);
  wetGrad.addColorStop(0, '#C9B57E');
  wetGrad.addColorStop(1, '#DCC99A');
  ctx.fillStyle = wetGrad;
  ctx.fillRect(0, wl, W, H * 0.05);

  // Sand
  const sandGrad = ctx.createLinearGradient(0, wl + H * 0.05, 0, H);
  sandGrad.addColorStop(0, '#E8D5A3');
  sandGrad.addColorStop(0.5, '#F0E0B0');
  sandGrad.addColorStop(1, '#E5D09A');
  ctx.fillStyle = sandGrad;
  ctx.fillRect(0, wl + H * 0.05, W, H - wl - H * 0.05);

  // Sand texture
  ctx.fillStyle = 'rgba(180,160,120,0.12)';
  for (let i = 0; i < 100; i++) {
    const sx = (i * 37 + 13) % W;
    const sy = wl + H * 0.06 + ((i * 53 + 7) % Math.floor(H * 0.63));
    ctx.beginPath(); ctx.arc(sx, sy, 1 + (i % 3) * 0.4, 0, Math.PI * 2); ctx.fill();
  }

  // ── Breakwater rocks (irregular polygons) ──
  breakwaterRocks.forEach(rock => {
    drawRockPoly(rock.x, rock.y, rock.points, rock.rot,
      ['#4A4239', '#5D5347', '#6E645A']);
  });

  // ── Beach sets: umbrella + 2 bigger deckchairs ──
  beachSets.forEach(bs => {
    const r = bs.radius;

    // ── Left deckchair (bigger, white/blue stripes) ──
    const lcx = bs.x - r - 10, lcy = bs.y;
    // Chair shadow
    ctx.fillStyle = 'rgba(0,0,0,0.06)';
    ctx.fillRect(lcx - 8, lcy - 6, 18, 28);
    // Frame
    ctx.fillStyle = '#D4CCC2';
    ctx.fillRect(lcx - 7, lcy - 5, 16, 26);
    // Fabric base – white
    ctx.fillStyle = '#FFFFFF';
    ctx.fillRect(lcx - 6, lcy - 4, 14, 24);
    // Sky blue stripes (himmelblau)
    ctx.fillStyle = '#87CEEB';
    for (let sy = 0; sy < 24; sy += 7) {
      ctx.fillRect(lcx - 6, lcy - 4 + sy, 14, 3);
    }
    // Headrest
    ctx.fillStyle = '#FFFFFF';
    ctx.fillRect(lcx - 5, lcy - 9, 12, 6);
    ctx.fillStyle = '#87CEEB';
    ctx.fillRect(lcx - 5, lcy - 8, 12, 2);

    // ── Right deckchair (bigger, white/blue stripes) ──
    const rcx = bs.x + r + 4, rcy = bs.y;
    ctx.fillStyle = 'rgba(0,0,0,0.06)';
    ctx.fillRect(rcx - 8, rcy - 6, 18, 28);
    ctx.fillStyle = '#D4CCC2';
    ctx.fillRect(rcx - 7, rcy - 5, 16, 26);
    ctx.fillStyle = '#FFFFFF';
    ctx.fillRect(rcx - 6, rcy - 4, 14, 24);
    ctx.fillStyle = '#87CEEB';
    for (let sy = 0; sy < 24; sy += 7) {
      ctx.fillRect(rcx - 6, rcy - 4 + sy, 14, 3);
    }
    ctx.fillStyle = '#FFFFFF';
    ctx.fillRect(rcx - 5, rcy - 9, 12, 6);
    ctx.fillStyle = '#87CEEB';
    ctx.fillRect(rcx - 5, rcy - 8, 12, 2);

    // ── Umbrella (solid blue, on top) ──
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.1)';
    ctx.beginPath(); ctx.ellipse(bs.x + 3, bs.y + 3, r + 3, r * 0.75, 0, 0, Math.PI * 2); ctx.fill();
    // Main umbrella – solid blue
    ctx.fillStyle = '#2196F3';
    ctx.beginPath(); ctx.arc(bs.x, bs.y, r, 0, Math.PI * 2); ctx.fill();
    // Subtle edge shading
    const umbGrad = ctx.createRadialGradient(bs.x - 3, bs.y - 3, 0, bs.x, bs.y, r);
    umbGrad.addColorStop(0, 'rgba(255,255,255,0.2)');
    umbGrad.addColorStop(0.6, 'rgba(255,255,255,0.05)');
    umbGrad.addColorStop(1, 'rgba(0,0,0,0.1)');
    ctx.fillStyle = umbGrad;
    ctx.beginPath(); ctx.arc(bs.x, bs.y, r, 0, Math.PI * 2); ctx.fill();
    // Pole
    ctx.fillStyle = '#aaa';
    ctx.beginPath(); ctx.arc(bs.x, bs.y, 2.5, 0, Math.PI * 2); ctx.fill();
    // Spike tip
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(bs.x, bs.y, 1, 0, Math.PI * 2); ctx.fill();
  });

  // ── Luzerner Familie ──
  luzernerFamilie.forEach((fam, fi) => {
    ctx.save();
    ctx.translate(fam.x, fam.y);
    // Towel
    ctx.fillStyle = 'rgba(255,200,200,0.5)';
    ctx.fillRect(-7, -3, 14, 10);
    // Body
    ctx.fillStyle = fam.color;
    ctx.beginPath(); ctx.ellipse(0, 0, 5, 7, 0, 0, Math.PI * 2); ctx.fill();
    // Head
    ctx.fillStyle = '#FFCC80';
    ctx.beginPath(); ctx.arc(0, -8, 4, 0, Math.PI * 2); ctx.fill();
    // Waving arm when shouting
    if (boernerBubble.timer > 0) {
      ctx.strokeStyle = '#FFCC80';
      ctx.lineWidth = 2;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(5, -2);
      ctx.lineTo(10 + Math.sin(frameCount * 0.4 + fi * 2) * 3, -6 - Math.abs(Math.sin(frameCount * 0.3 + fi)) * 4);
      ctx.stroke();
    }
    ctx.restore();
  });

  // ── Börner speech bubble ──
  if (boernerBubble.timer > 0) {
    boernerBubble.timer--;
    ctx.font = 'bold 10px sans-serif';
    const bx = boernerBubble.x, by = boernerBubble.y - 22;
    ctx.fillStyle = 'rgba(255,255,255,0.92)';
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1.5;
    const tw = ctx.measureText(boernerBubble.text).width + 14;
    const bh = 18;
    ctx.beginPath(); ctx.roundRect(bx - tw / 2, by - bh / 2, tw, bh, 6);
    ctx.fill(); ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.92)';
    ctx.beginPath();
    ctx.moveTo(bx - 4, by + bh / 2); ctx.lineTo(bx, by + bh / 2 + 6); ctx.lineTo(bx + 4, by + bh / 2);
    ctx.fill();
    ctx.fillStyle = '#B71C1C';
    ctx.textAlign = 'center';
    ctx.fillText(boernerBubble.text, bx, by + 4);
    ctx.fillStyle = 'rgba(100,100,100,0.5)';
    ctx.font = '7px sans-serif';
    ctx.fillText('🇨🇭 Luzärner', bx, by - bh / 2 - 4);
  }

  // Zone labels
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.font = 'bold 11px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('🌊 MARE 🌊', W / 2, H * 0.08);
  ctx.fillStyle = 'rgba(120,100,60,0.3)';
  ctx.fillText('🏖️ SPIAGGIA 🏖️', W / 2, H * 0.92);
}

// ── Draw Player ──
function drawPlayer() {
  const { x, y, size } = player;
  const s = size;
  const swimming = isInWater(y);

  if (swimming) {
    drawPlayerSwimming(x, y, s);
  } else {
    drawPlayerWalking(x, y, s);
  }
}

function drawPlayerSwimming(x, y, s) {
  const swimPhase = frameCount * 0.12;
  const bobY = Math.sin(swimPhase * 0.6) * 2;

  // Water splash ripples around player
  ctx.strokeStyle = 'rgba(255,255,255,0.35)';
  ctx.lineWidth = 1;
  for (let i = 0; i < 3; i++) {
    const ripR = s * 0.6 + i * 5 + Math.sin(swimPhase + i) * 2;
    ctx.globalAlpha = 0.3 - i * 0.08;
    ctx.beginPath(); ctx.ellipse(x, y + 4 + bobY, ripR, ripR * 0.4, 0, 0, Math.PI * 2); ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // Lower body submerged – draw water overlay later
  // Swimming arms – alternating crawl strokes
  const leftArmAngle = Math.sin(swimPhase) * 0.8;
  const rightArmAngle = Math.sin(swimPhase + Math.PI) * 0.8;

  ctx.strokeStyle = '#FFCC80'; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
  // Left arm stroke
  const laX = x - s * 0.35;
  const laY = y - 2 + bobY;
  const laEndX = laX - Math.cos(leftArmAngle) * s * 0.55;
  const laEndY = laY + Math.sin(leftArmAngle) * s * 0.3 - (leftArmAngle > 0 ? s * 0.2 : 0);
  ctx.beginPath(); ctx.moveTo(laX, laY); ctx.lineTo(laEndX, laEndY); ctx.stroke();
  // Splash on downstroke
  if (leftArmAngle > 0.5) {
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.beginPath(); ctx.arc(laEndX, laEndY, 3, 0, Math.PI * 2); ctx.fill();
  }

  // Right arm stroke
  const raX = x + s * 0.35;
  const raY = y - 2 + bobY;
  const raEndX = raX + Math.cos(rightArmAngle) * s * 0.55;
  const raEndY = raY + Math.sin(rightArmAngle) * s * 0.3 - (rightArmAngle > 0 ? s * 0.2 : 0);
  ctx.beginPath(); ctx.moveTo(raX, raY); ctx.lineTo(raEndX, raEndY); ctx.stroke();
  if (rightArmAngle > 0.5) {
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.beginPath(); ctx.arc(raEndX, raEndY, 3, 0, Math.PI * 2); ctx.fill();
  }

  // Body – partially submerged, slight tilt
  const tilt = Math.sin(swimPhase * 0.5) * 0.05;
  ctx.save();
  ctx.translate(x, y + bobY);
  ctx.rotate(tilt);
  // Torso (shirt visible above water)
  ctx.fillStyle = '#E8F5E9';
  ctx.beginPath(); ctx.ellipse(0, -2, s * 0.4, s * 0.25, 0, 0, Math.PI * 2); ctx.fill();
  // Kicking legs – faded under water
  ctx.globalAlpha = 0.35;
  ctx.fillStyle = '#5D4037';
  const kickL = Math.sin(swimPhase) * 5;
  const kickR = Math.sin(swimPhase + Math.PI) * 5;
  ctx.beginPath(); ctx.ellipse(-3, s * 0.35 + kickL, 2.5, 5, 0.2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(3, s * 0.35 + kickR, 2.5, 5, -0.2, 0, Math.PI * 2); ctx.fill();
  ctx.globalAlpha = 1;
  ctx.restore();

  // Head (above water, bobbing)
  ctx.fillStyle = '#FFCC80';
  ctx.beginPath(); ctx.arc(x, y - s * 0.28 + bobY, s * 0.28, 0, Math.PI * 2); ctx.fill();
  // Eyes
  ctx.fillStyle = '#333';
  ctx.beginPath(); ctx.arc(x - 2.5, y - s * 0.3 + bobY, 1.3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + 2.5, y - s * 0.3 + bobY, 1.3, 0, Math.PI * 2); ctx.fill();
  // Mouth – slight effort grimace
  ctx.strokeStyle = '#5D4037'; ctx.lineWidth = 0.8;
  ctx.beginPath(); ctx.arc(x, y - s * 0.2 + bobY, 2.5, 0, Math.PI); ctx.stroke();
  // Mütze (wet, still on)
  ctx.fillStyle = '#B71C1C';
  ctx.beginPath(); ctx.ellipse(x, y - s * 0.42 + bobY, s * 0.35, s * 0.1, 0, Math.PI, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#C62828';
  ctx.beginPath(); ctx.arc(x, y - s * 0.42 + bobY, s * 0.22, Math.PI, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#FFEB3B';
  ctx.beginPath(); ctx.arc(x, y - s * 0.55 + bobY, 1.5, 0, Math.PI * 2); ctx.fill();
  // Sunglasses
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(x - 5, y - s * 0.33 + bobY, 4, 2.5);
  ctx.fillRect(x + 1, y - s * 0.33 + bobY, 4, 2.5);
  ctx.strokeStyle = '#333'; ctx.lineWidth = 0.5;
  ctx.beginPath(); ctx.moveTo(x - 1, y - s * 0.32 + bobY); ctx.lineTo(x + 1, y - s * 0.32 + bobY); ctx.stroke();

  // Water surface overlay on body
  ctx.fillStyle = 'rgba(0,150,200,0.18)';
  ctx.beginPath(); ctx.ellipse(x, y + 3 + bobY, s * 0.55, s * 0.25, 0, 0, Math.PI * 2); ctx.fill();
}

function drawPlayerWalking(x, y, s) {
  const legPhase = frameCount * 0.15;
  ctx.fillStyle = '#5D4037';
  ctx.beginPath(); ctx.ellipse(x - 3, y + s * 0.4 + Math.sin(legPhase) * 2, 2.5, 4, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x + 3, y + s * 0.4 + Math.sin(legPhase + Math.PI) * 2, 2.5, 4, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#E8F5E9';
  ctx.beginPath(); ctx.ellipse(x, y, s * 0.45, s * 0.35, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#1565C0';
  ctx.beginPath(); ctx.ellipse(x, y + s * 0.22, s * 0.38, s * 0.15, 0, 0, Math.PI); ctx.fill();
  ctx.strokeStyle = '#FFCC80'; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(x - s * 0.4, y - 1); ctx.lineTo(x - s * 0.6, y + s * 0.15); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x + s * 0.4, y - 1); ctx.lineTo(x + s * 0.65, y - s * 0.2); ctx.stroke();
  // Aperol Spritz
  const gx = x + s * 0.65, gy = y - s * 0.2;
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.beginPath(); ctx.moveTo(gx - 4, gy - 7); ctx.lineTo(gx + 4, gy - 7);
  ctx.lineTo(gx + 3, gy + 2); ctx.lineTo(gx - 3, gy + 2); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#FF6D00';
  ctx.beginPath(); ctx.moveTo(gx - 3.5, gy - 4); ctx.lineTo(gx + 3.5, gy - 4);
  ctx.lineTo(gx + 3, gy + 2); ctx.lineTo(gx - 3, gy + 2); ctx.closePath(); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.fillRect(gx - 2, gy - 3, 2, 2); ctx.fillRect(gx + 0.5, gy - 5, 2, 2);
  ctx.fillStyle = '#FF9800';
  ctx.beginPath(); ctx.arc(gx + 3, gy - 5, 2.5, 0, Math.PI, true); ctx.fill();
  ctx.strokeStyle = '#E53935'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(gx - 1, gy - 7); ctx.lineTo(gx - 3, gy - 14); ctx.stroke();
  // Head
  ctx.fillStyle = '#FFCC80';
  ctx.beginPath(); ctx.arc(x, y - s * 0.28, s * 0.28, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#333';
  ctx.beginPath(); ctx.arc(x - 2.5, y - s * 0.3, 1.3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + 2.5, y - s * 0.3, 1.3, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#5D4037'; ctx.lineWidth = 0.8;
  ctx.beginPath(); ctx.arc(x, y - s * 0.22, 3, 0.1, Math.PI - 0.1); ctx.stroke();
  // Mütze
  ctx.fillStyle = '#B71C1C';
  ctx.beginPath(); ctx.ellipse(x, y - s * 0.42, s * 0.35, s * 0.1, 0, Math.PI, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#C62828';
  ctx.beginPath(); ctx.arc(x, y - s * 0.42, s * 0.22, Math.PI, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#FFEB3B';
  ctx.beginPath(); ctx.arc(x, y - s * 0.55, 1.5, 0, Math.PI * 2); ctx.fill();
  // Sunglasses
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(x - 5, y - s * 0.33, 4, 2.5);
  ctx.fillRect(x + 1, y - s * 0.33, 4, 2.5);
  ctx.strokeStyle = '#333'; ctx.lineWidth = 0.5;
  ctx.beginPath(); ctx.moveTo(x - 1, y - s * 0.32); ctx.lineTo(x + 1, y - s * 0.32); ctx.stroke();
}

// ── Draw a dog ──
function drawDog(dog) {
  const { x, y, size, angle, name, bodyColor, bellyColor } = dog;
  const s = size;
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);

  ctx.fillStyle = bodyColor;
  ctx.beginPath(); ctx.ellipse(0, 0, s * 0.65, s * 0.4, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = bellyColor;
  ctx.beginPath(); ctx.ellipse(0, 2, s * 0.4, s * 0.2, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = bodyColor;
  ctx.beginPath(); ctx.arc(s * 0.55, 0, s * 0.32, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = darken(bodyColor, 30);
  ctx.beginPath(); ctx.ellipse(s * 0.78, 2, s * 0.15, s * 0.1, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#2D1B0E';
  ctx.beginPath(); ctx.arc(s * 0.85, 1, 2.5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#2D1B0E';
  ctx.beginPath(); ctx.arc(s * 0.52, -4, 2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(s * 0.52, 4, 2, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = darken(bodyColor, 30);
  ctx.beginPath(); ctx.ellipse(s * 0.35, -s * 0.3, s * 0.12, s * 0.2, -0.3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(s * 0.35, s * 0.3, s * 0.12, s * 0.2, 0.3, 0, Math.PI * 2); ctx.fill();
  const wagAngle = Math.sin(frameCount * 0.3 + x) * 0.6;
  ctx.strokeStyle = bodyColor; ctx.lineWidth = 3; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-s * 0.6, 0);
  ctx.quadraticCurveTo(-s * 0.85, Math.sin(wagAngle) * s * 0.4, -s * 0.7, Math.sin(wagAngle) * s * 0.5);
  ctx.stroke();
  ctx.fillStyle = bodyColor;
  const legPhase = frameCount * 0.2 + y;
  [[-0.3, -0.35], [-0.3, 0.35], [0.2, -0.35], [0.2, 0.35]].forEach(([lx, ly], i) => {
    const legOff = Math.sin(legPhase + i * 1.6) * 3;
    ctx.beginPath(); ctx.arc(s * lx + legOff, s * ly, 3, 0, Math.PI * 2); ctx.fill();
  });
  ctx.fillStyle = '#E53935';
  ctx.beginPath(); ctx.ellipse(s * 0.15, -2, 5, 4, 0, 0, Math.PI * 2); ctx.fill();

  ctx.restore();

  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.font = 'bold 8px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(name, x, y - s * 0.55);
}

function darken(hex, amt) {
  let r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  r = Math.max(0, r - amt); g = Math.max(0, g - amt); b = Math.max(0, b - amt);
  return '#' + [r,g,b].map(c => c.toString(16).padStart(2,'0')).join('');
}

// ── Draw one Jellyfish ──
function drawOneJellyfish(jf) {
  const { x, y, size } = jf;
  const s = size;
  const phase = frameCount * 0.05;
  ctx.save(); ctx.translate(x, y);
  ctx.globalAlpha = 0.7;
  ctx.fillStyle = '#E040FB';
  ctx.beginPath(); ctx.arc(0, 0, s * 0.5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#F48FB1';
  ctx.beginPath(); ctx.arc(0, 0, s * 0.3, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#FCE4EC';
  ctx.beginPath(); ctx.arc(0, 0, s * 0.12, 0, Math.PI * 2); ctx.fill();
  ctx.globalAlpha = 0.5; ctx.strokeStyle = '#CE93D8'; ctx.lineWidth = 1.5;
  for (let t = 0; t < 8; t++) {
    const ba = (t / 8) * Math.PI * 2 + phase * 0.3;
    ctx.beginPath();
    const sr = s * 0.45;
    const sx = Math.cos(ba) * sr, sy = Math.sin(ba) * sr;
    ctx.moveTo(sx, sy);
    const er = s * 0.9 + Math.sin(phase + t) * s * 0.15;
    const ex = Math.cos(ba + Math.sin(phase + t * 0.7) * 0.2) * er;
    const ey = Math.sin(ba + Math.sin(phase + t * 0.7) * 0.2) * er;
    const mx = (sx + ex) / 2 + Math.sin(phase + t * 1.3) * 3;
    const my = (sy + ey) / 2 + Math.cos(phase + t * 1.3) * 3;
    ctx.quadraticCurveTo(mx, my, ex, ey); ctx.stroke();
  }
  ctx.globalAlpha = 1; ctx.restore();
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.font = 'bold 8px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('MEDUSA', x, y - s * 0.7);
}

// ════════════════════════════════════════
//  GAME LOGIC
// ════════════════════════════════════════

function updatePlayer() {
  const speed = 2.5;
  let dx = 0, dy = 0;

  if (keys['ArrowLeft'] || keys['a']) dx -= 1;
  if (keys['ArrowRight'] || keys['d']) dx += 1;
  if (keys['ArrowUp'] || keys['w']) dy -= 1;
  if (keys['ArrowDown'] || keys['s']) dy += 1;
  dx += touchDir.x;
  dy += touchDir.y;

  if (dx || dy) {
    const len = Math.hypot(dx, dy);
    player.x += (dx / len) * speed;
    player.y += (dy / len) * speed;
  }

  // Clamp to canvas
  const W = canvas.width, H = canvas.height, s = player.size;
  player.x = Math.max(s, Math.min(W - s, player.x));
  player.y = Math.max(s, Math.min(H - s, player.y));

  // ── Collision with beach sets (umbrella + chairs) ──
  const col = beachSetCollision(player.x, player.y, s * 0.4);
  if (col) {
    const pushDist = (col.type === 'umbrella') ? col.needed - col.dist + 2 : 6;
    player.x += col.dx * pushDist;
    player.y += col.dy * pushDist;

    if (col.type === 'umbrella') {
      const now = Date.now();
      if (now - lastUmbrellaHitTime > 2000) {
        lastUmbrellaHitTime = now;
        spawnNewDog();
      }
    }
  }

  // ── Collision with sea/breakwater rocks → spawn jellyfish ──
  const rc = seaRockCollision(player.x, player.y, s * 0.4);
  if (rc) {
    player.x += rc.dx * (rc.overlap + 2);
    player.y += rc.dy * (rc.overlap + 2);
    const now = Date.now();
    if (now - lastRockHitTime > 2000) {
      lastRockHitTime = now;
      spawnJellyfish();
    }
  }
}

function updateDogs() {
  const wl = waterLineY();
  const now = Date.now();

  dogs.forEach(dog => {
    const dx = player.x - dog.x;
    const dy = player.y - dog.y;
    const d = Math.hypot(dx, dy);

    dog.angle = Math.atan2(dy, dx);
    dog.speed = 1.2 + timeVal * 0.015 + dogs.length * 0.05;

    let targetX = player.x, targetY = player.y;
    if (isInWater(player.y)) {
      targetY = wl + 10;
      targetX = player.x;
    }

    const tdx = targetX - dog.x;
    const tdy = targetY - dog.y;
    const td = Math.hypot(tdx, tdy);
    if (td > 2) {
      dog.x += (tdx / td) * dog.speed;
      dog.y += (tdy / td) * dog.speed;
    }

    dog.y = Math.max(wl + 5, Math.min(canvas.height - 10, dog.y));
    dog.x = Math.max(10, Math.min(canvas.width - 10, dog.x));

    if (!isInWater(player.y) && dist(player, dog) < player.size * 0.5 + dog.size * 0.5) {
      if (now - lastHitTime > 1500) {
        lastHitTime = now;
        lives--;
        scoreVal = Math.max(0, scoreVal - 10);
        showShout('E------DDDY!!! 🐕');
        shoutEddy();
        updateUI();
        if (d > 0) {
          player.x -= (dx / d) * 30;
          player.y -= (dy / d) * 30;
        }
      }
    }
  });
}

function updateJellyfishes() {
  const wl = waterLineY();

  jellyfishes.forEach(jf => {
    jf.tentaclePhase = frameCount * 0.06;
    jf.speed = 0.9 + timeVal * 0.012 + jellyfishes.length * 0.03;

    let targetX = player.x, targetY = player.y;
    if (!isInWater(player.y)) {
      // Wander in water when player is on sand
      jf.wanderAngle += (Math.random() - 0.5) * 0.15;
      targetX = jf.x + Math.cos(jf.wanderAngle) * 50;
      targetY = jf.y + Math.sin(jf.wanderAngle) * 50;
      targetY = Math.max(15, Math.min(wl - 15, targetY));
      targetX = Math.max(15, Math.min(canvas.width - 15, targetX));
    }

    const dx = targetX - jf.x;
    const dy = targetY - jf.y;
    const d = Math.hypot(dx, dy);
    if (d > 2) {
      jf.x += (dx / d) * jf.speed;
      jf.y += (dy / d) * jf.speed;
    }

    jf.y = Math.max(10, Math.min(wl - 5, jf.y));
    jf.x = Math.max(10, Math.min(canvas.width - 10, jf.x));

    // Push away from rocks
    const rc = seaRockCollision(jf.x, jf.y, jf.size * 0.4);
    if (rc) {
      jf.x += rc.dx * (rc.overlap + 1);
      jf.y += rc.dy * (rc.overlap + 1);
    }

    // Collision with player
    if (isInWater(player.y) && dist(player, jf) < player.size * 0.5 + jf.size * 0.5) {
      const now = Date.now();
      if (now - lastHitTime > 1500) {
        lastHitTime = now;
        lives--;
        scoreVal = Math.max(0, scoreVal - 10);
        showShout('MEDUUUUSAAAA!!! 🪼');
        shoutMedusa();
        updateUI();
        const dd = Math.max(1, dist(player, jf));
        player.x -= ((player.x - jf.x) / dd) * -30;
        player.y -= ((player.y - jf.y) / dd) * -30;
      }
    }
  });
}

function showShout(text) {
  const el = document.getElementById('shout');
  el.textContent = text;
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
  clearTimeout(shoutTimer);
  shoutTimer = setTimeout(() => el.classList.remove('show'), 1200);
}

// ════════════════════════════════════════
//  GAME LOOP
// ════════════════════════════════════════
function gameLoop() {
  if (!gameRunning) return;
  requestAnimationFrame(gameLoop);

  frameCount++;
  timeVal = Math.floor((Date.now() - gameStartTime) / 1000);
  scoreVal = timeVal * 2;

  updatePlayer();
  updateDogs();
  updateJellyfishes();
  updateBoernerShout();
  updateUI();

  // Draw
  drawMap();
  jellyfishes.forEach(jf => drawOneJellyfish(jf));
  dogs.forEach(d => drawDog(d));
  drawPlayer();

  // Proximity warnings
  if (!isInWater(player.y)) {
    let minDogDist = Infinity;
    dogs.forEach(d => { minDogDist = Math.min(minDogDist, dist(player, d)); });
    if (minDogDist < 70) {
      ctx.fillStyle = `rgba(255,0,0,${0.08 * (1 - minDogDist / 70)})`;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
  }
  if (isInWater(player.y)) {
    let minJellyDist = Infinity;
    jellyfishes.forEach(jf => { minJellyDist = Math.min(minJellyDist, dist(player, jf)); });
    if (minJellyDist < 60) {
      ctx.fillStyle = `rgba(200,0,255,${0.08 * (1 - minJellyDist / 60)})`;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
  }

  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = '10px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText(isInWater(player.y) ? '🌊 Im Wasser – Vorsicht Medusa!' : '🏖️ Am Strand – Vorsicht Eddy!', 8, canvas.height - 8);

  if (lives <= 0) {
    gameRunning = false;
    stopAllAudio();
    showGameOver();
  }
}

function showGameOver() {
  const ov = document.createElement('div');
  ov.id = 'startOverlay';
  ov.innerHTML = `
    <h1>😴 Game Over 😴</h1>
    <h2 style="color:#FFD54F;font-size:1.5rem;margin-bottom:10px;text-shadow:2px 2px 6px rgba(0,0,0,0.4);">Sei stancooo? Sei stancooo? 🏖️</h2>
    <p>Du hast <b>${timeVal}</b> Sekunden überlebt!<br>Punkte: <b>${scoreVal}</b><br>🐕 Hunde: <b>${dogs.length}</b><br>🪼 Medusen: <b>${jellyfishes.length}</b></p>
    <button class="btn" onclick="this.parentElement.remove(); beginGame();">Nochmal! ☀️</button>
  `;
  document.body.appendChild(ov);
}

// ════════════════════════════════════════
//  INPUT
// ════════════════════════════════════════
document.addEventListener('keydown', e => { keys[e.key] = true; e.preventDefault(); });
document.addEventListener('keyup', e => { keys[e.key] = false; });

function setupMobileButton(id, dx, dy) {
  const btn = document.getElementById(id);
  if (!btn) return;
  const start = () => { touchDir.x = dx; touchDir.y = dy; };
  const end = () => { touchDir.x = 0; touchDir.y = 0; };
  btn.addEventListener('touchstart', e => { e.preventDefault(); start(); });
  btn.addEventListener('touchend', e => { e.preventDefault(); end(); });
  btn.addEventListener('mousedown', start);
  btn.addEventListener('mouseup', end);
  btn.addEventListener('mouseleave', end);
}
setupMobileButton('btnUp', 0, -1);
setupMobileButton('btnDown', 0, 1);
setupMobileButton('btnLeft', -1, 0);
setupMobileButton('btnRight', 1, 0);

let touchStart = null;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  touchStart = { x: t.clientX, y: t.clientY };
});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!touchStart) return;
  const t = e.touches[0];
  const dx = t.clientX - touchStart.x;
  const dy = t.clientY - touchStart.y;
  const len = Math.hypot(dx, dy);
  if (len > 8) { touchDir.x = dx / len; touchDir.y = dy / len; }
});
canvas.addEventListener('touchend', () => { touchDir.x = 0; touchDir.y = 0; touchStart = null; });

// ════════════════════════════════════════
//  START
// ════════════════════════════════════════
function beginGame() {
  const overlay = document.getElementById('startOverlay');
  if (overlay) overlay.remove();
  ensureAudio();
  resize();
  initGame();
  gameRunning = true;
  if (!muted) { startWaves(); playFelicita(); }
  gameLoop();
}
</script>
