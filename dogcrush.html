<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐶 Dog Crush 🐶</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    user-select: none;
    overflow: hidden;
  }

  h1 {
    color: #fff;
    font-size: 2.8rem;
    text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
    margin-bottom: 8px;
    letter-spacing: 2px;
  }

  .stats {
    display: flex;
    gap: 30px;
    margin-bottom: 12px;
    color: #fff;
    font-size: 1.2rem;
    font-weight: 600;
    text-shadow: 1px 1px 4px rgba(0,0,0,0.3);
  }

  .stats span {
    background: rgba(255,255,255,0.18);
    padding: 6px 18px;
    border-radius: 20px;
    backdrop-filter: blur(4px);
  }

  #board {
    display: grid;
    grid-template-columns: repeat(8, 64px);
    grid-template-rows: repeat(8, 64px);
    gap: 4px;
    background: rgba(255,255,255,0.12);
    padding: 10px;
    border-radius: 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    position: relative;
  }

  .cell {
    width: 64px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 46px;
    border-radius: 12px;
    background: rgba(255,255,255,0.85);
    cursor: pointer;
    transition: transform 0.12s, box-shadow 0.12s, background 0.15s;
    position: relative;
    animation: dropIn 0.35s ease-out;
  }

  .cell:hover {
    transform: scale(1.08);
    box-shadow: 0 4px 14px rgba(0,0,0,0.2);
    z-index: 2;
  }

  .cell.selected {
    background: rgba(255, 235, 59, 0.7);
    transform: scale(1.12);
    box-shadow: 0 0 18px 4px rgba(255,235,59,0.6);
    z-index: 3;
  }

  .cell.matched {
    animation: pop 0.35s ease-out forwards;
  }

  .cell.swap {
    transition: transform 0.25s ease-in-out;
  }

  .cell.hint {
    animation: hintPulse 0.7s ease-in-out infinite alternate;
  }

  @keyframes dropIn {
    0%   { transform: translateY(-80px) scale(0.6); opacity: 0; }
    60%  { transform: translateY(6px) scale(1.05); opacity: 1; }
    100% { transform: translateY(0) scale(1); opacity: 1; }
  }

  @keyframes pop {
    0%   { transform: scale(1); opacity: 1; }
    50%  { transform: scale(1.4); opacity: 0.6; }
    100% { transform: scale(0); opacity: 0; }
  }

  @keyframes hintPulse {
    0%   { transform: scale(1); box-shadow: 0 0 0 rgba(255,235,59,0); }
    100% { transform: scale(1.12); box-shadow: 0 0 14px 4px rgba(255,235,59,0.5); }
  }

  .combo-text {
    position: absolute;
    color: #fff;
    font-size: 1.5rem;
    font-weight: 900;
    text-shadow: 2px 2px 6px rgba(0,0,0,0.4);
    pointer-events: none;
    animation: floatUp 0.9s ease-out forwards;
    z-index: 100;
  }

  @keyframes floatUp {
    0%   { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-60px) scale(1.5); }
  }

  .btn {
    margin-top: 14px;
    padding: 10px 30px;
    font-size: 1.1rem;
    font-weight: 700;
    color: #764ba2;
    background: #fff;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(0,0,0,0.15);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .btn:hover {
    transform: scale(1.06);
    box-shadow: 0 6px 20px rgba(0,0,0,0.2);
  }

  .game-over-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 999;
    backdrop-filter: blur(6px);
  }
  .game-over-overlay h2 {
    color: #fff;
    font-size: 2.6rem;
    margin-bottom: 10px;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.4);
  }
  .game-over-overlay p {
    color: #eee;
    font-size: 1.3rem;
    margin-bottom: 20px;
  }
</style>
</head>
<body>

<h1>🐶 Dog Crush 🐶</h1>
<div class="stats">
  <span>⭐ Punkte: <b id="score">0</b></span>
  <span>🔄 Züge: <b id="moves">30</b></span>
</div>
<div id="board"></div>
<button class="btn" onclick="initGame()">Neues Spiel</button>

<script>
// ── Dog types using different dog images (emoji) ──
const DOGS = ['🐶','🐕','🦮','🐩','🐕‍🦺','🐾'];
const COLS = 8, ROWS = 8;
let grid = [];
let selected = null;
let score = 0;
let moves = 30;
let locked = false;

const boardEl = document.getElementById('board');
const scoreEl = document.getElementById('score');
const movesEl = document.getElementById('moves');

// ── Utility ──
const rnd = arr => arr[Math.floor(Math.random() * arr.length)];
const idx = (r, c) => r * COLS + c;
const inBounds = (r, c) => r >= 0 && r < ROWS && c >= 0 && c < COLS;

// ── Create a grid with no initial matches ──
function generateGrid() {
  const g = Array.from({ length: ROWS }, () => Array(COLS).fill(null));
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      let choices = [...DOGS];
      // prevent horizontal match
      if (c >= 2 && g[r][c-1] === g[r][c-2]) {
        choices = choices.filter(d => d !== g[r][c-1]);
      }
      // prevent vertical match
      if (r >= 2 && g[r-1][c] === g[r-2][c]) {
        choices = choices.filter(d => d !== g[r-1][c]);
      }
      g[r][c] = rnd(choices);
    }
  }
  return g;
}

// ── Render ──
function render() {
  boardEl.innerHTML = '';
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.textContent = grid[r][c] || '';
      cell.dataset.row = r;
      cell.dataset.col = c;
      if (selected && selected.r === r && selected.c === c) {
        cell.classList.add('selected');
      }
      cell.addEventListener('click', () => onCellClick(r, c));
      // Touch / pointer drag support
      cell.addEventListener('pointerdown', e => onPointerDown(e, r, c));
      boardEl.appendChild(cell);
    }
  }
  scoreEl.textContent = score;
  movesEl.textContent = moves;
}

// ── Pointer drag support ──
let dragStart = null;
function onPointerDown(e, r, c) {
  dragStart = { r, c, x: e.clientX, y: e.clientY };
  const onUp = ev => {
    if (!dragStart) return;
    const dx = ev.clientX - dragStart.x;
    const dy = ev.clientY - dragStart.y;
    const absDx = Math.abs(dx), absDy = Math.abs(dy);
    if (absDx > 20 || absDy > 20) {
      let tr = r, tc = c;
      if (absDx > absDy) tc += dx > 0 ? 1 : -1;
      else tr += dy > 0 ? 1 : -1;
      if (inBounds(tr, tc)) {
        selected = { r, c };
        trySwap(tr, tc);
      }
    }
    dragStart = null;
    document.removeEventListener('pointerup', onUp);
  };
  document.addEventListener('pointerup', onUp);
}

// ── Cell click ──
function onCellClick(r, c) {
  if (locked) return;
  if (!selected) {
    selected = { r, c };
    render();
    return;
  }
  // Check adjacency
  const dr = Math.abs(selected.r - r);
  const dc = Math.abs(selected.c - c);
  if ((dr === 1 && dc === 0) || (dr === 0 && dc === 1)) {
    trySwap(r, c);
  } else {
    selected = { r, c };
    render();
  }
}

// ── Swap logic ──
async function trySwap(r, c) {
  if (locked) return;
  locked = true;
  const sr = selected.r, sc = selected.c;
  selected = null;

  // Swap
  swap(sr, sc, r, c);
  render();

  const matches = findAllMatches();
  if (matches.size > 0) {
    moves--;
    await processMatches(matches);
    if (moves <= 0 && !hasValidMove()) {
      showGameOver();
    } else if (!hasValidMove()) {
      // Reshuffle
      grid = generateGrid();
      render();
    }
  } else {
    // Swap back
    await delay(200);
    swap(sr, sc, r, c);
    render();
  }
  locked = false;
}

function swap(r1, c1, r2, c2) {
  const tmp = grid[r1][c1];
  grid[r1][c1] = grid[r2][c2];
  grid[r2][c2] = tmp;
}

// ── Match detection ──
function findAllMatches() {
  const matched = new Set();
  // Horizontal
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS - 2; c++) {
      const d = grid[r][c];
      if (d && d === grid[r][c+1] && d === grid[r][c+2]) {
        let end = c + 2;
        while (end + 1 < COLS && grid[r][end+1] === d) end++;
        for (let k = c; k <= end; k++) matched.add(idx(r, k));
        c = end;
      }
    }
  }
  // Vertical
  for (let c = 0; c < COLS; c++) {
    for (let r = 0; r < ROWS - 2; r++) {
      const d = grid[r][c];
      if (d && d === grid[r+1][c] && d === grid[r+2][c]) {
        let end = r + 2;
        while (end + 1 < ROWS && grid[end+1][c] === d) end++;
        for (let k = r; k <= end; k++) matched.add(idx(k, c));
        r = end;
      }
    }
  }
  return matched;
}

// ── Process matches: remove, drop, refill, repeat ──
async function processMatches(matches) {
  let combo = 0;
  while (matches.size > 0) {
    combo++;
    const pts = matches.size * 10 * combo;
    score += pts;

    // Animate matched cells
    const cells = boardEl.children;
    matches.forEach(i => {
      if (cells[i]) cells[i].classList.add('matched');
    });
    showComboText(pts, combo);
    await delay(350);

    // Remove matched
    matches.forEach(i => {
      const r = Math.floor(i / COLS), c = i % COLS;
      grid[r][c] = null;
    });

    // Gravity
    applyGravity();
    // Fill
    fillEmpty();
    render();
    await delay(350);

    matches = findAllMatches();
  }
}

function applyGravity() {
  for (let c = 0; c < COLS; c++) {
    let writeRow = ROWS - 1;
    for (let r = ROWS - 1; r >= 0; r--) {
      if (grid[r][c] !== null) {
        grid[writeRow][c] = grid[r][c];
        if (writeRow !== r) grid[r][c] = null;
        writeRow--;
      }
    }
    for (let r = writeRow; r >= 0; r--) {
      grid[r][c] = null;
    }
  }
}

function fillEmpty() {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (grid[r][c] === null) grid[r][c] = rnd(DOGS);
    }
  }
}

// ── Check if any valid move exists ──
function hasValidMove() {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      // try swap right
      if (c + 1 < COLS) {
        swap(r, c, r, c + 1);
        if (findAllMatches().size > 0) { swap(r, c, r, c + 1); return true; }
        swap(r, c, r, c + 1);
      }
      // try swap down
      if (r + 1 < ROWS) {
        swap(r, c, r + 1, c);
        if (findAllMatches().size > 0) { swap(r, c, r + 1, c); return true; }
        swap(r, c, r + 1, c);
      }
    }
  }
  return false;
}

// ── Combo floating text ──
function showComboText(pts, combo) {
  const el = document.createElement('div');
  el.className = 'combo-text';
  el.textContent = combo > 1 ? `+${pts}  x${combo} COMBO!` : `+${pts}`;
  el.style.left = '50%';
  el.style.top = '50%';
  el.style.transform = 'translate(-50%, -50%)';
  boardEl.appendChild(el);
  setTimeout(() => el.remove(), 900);
}

// ── Game over ──
function showGameOver() {
  const ov = document.createElement('div');
  ov.className = 'game-over-overlay';
  ov.innerHTML = `
    <h2>🐶 Spiel vorbei! 🐶</h2>
    <p>Dein Ergebnis: <b>${score}</b> Punkte</p>
    <button class="btn" onclick="this.parentElement.remove(); initGame();">Nochmal spielen</button>
  `;
  document.body.appendChild(ov);
}

function delay(ms) {
  return new Promise(res => setTimeout(res, ms));
}

// ── Init ──
function initGame() {
  score = 0;
  moves = 30;
  selected = null;
  locked = false;
  grid = generateGrid();
  // Ensure at least one valid move
  while (!hasValidMove()) grid = generateGrid();
  render();
}

initGame();
</script>
</body>
</html>
